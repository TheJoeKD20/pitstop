name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - id: install
        name: Install dependencies
        run: npm ci

      - id: typecheck
        name: Typecheck
        run: npm run typecheck

      - id: test
        name: Run tests
        run: npm test

      - id: build
        name: Build
        run: npm run build
